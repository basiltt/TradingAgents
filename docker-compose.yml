services:
  tradingagents:
    build: .
    env_file:
      - .env
    environment:
      TRADINGAGENTS_DISABLE_RELOAD: "1"
    ports:
      - "5177:5177"
      - "8877:8877"
    volumes:
      - tradingagents_data:/root/.tradingagents
    tty: true
    stdin_open: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8877/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  tradingagents_data:
