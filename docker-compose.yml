services:
  tradingagents:
    build: .
    env_file:
      - .env
    environment:
      TRADINGAGENTS_DISABLE_RELOAD: "1"
    ports:
      - "5177:5177"
      - "8877:8877"
    volumes:
      - tradingagents_data:/root/.tradingagents
    tty: true
    stdin_open: true

volumes:
  tradingagents_data:
