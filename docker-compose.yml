services:
  tradingagents:
    build: .
    env_file:
      - .env
    environment:
      TRADINGAGENTS_DISABLE_RELOAD: "1"
    ports:
      - "5177:5177"
      - "8877:8877"
    volumes:
      - tradingagents_data:/app/.tradingagents
    tty: true
    stdin_open: true
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; r=urllib.request.urlopen('http://localhost:8877/api/v1/health'); assert r.status==200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  tradingagents_data:
