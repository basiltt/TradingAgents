services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tradingagents
    ports:
      # Bind the Postgres port to the HOST's loopback only. The app reaches the DB
      # over the compose network (db:5432) regardless of this map; publishing it at
      # all is just for host-side debugging. Trivial creds (postgres/postgres) + a
      # 0.0.0.0 publish would expose the DB to the LAN. Override the host interface
      # via TRADINGAGENTS_HOST_BIND only on a trusted network.
      - "${TRADINGAGENTS_HOST_BIND:-127.0.0.1}:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  tradingagents:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      TRADINGAGENTS_DISABLE_RELOAD: "1"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tradingagents
    ports:
      # SECURITY: publish to the HOST's loopback only by default. Inside the container
      # uvicorn/vite bind 0.0.0.0 (required — Docker forwards host→container eth0, never
      # to container-loopback), so the REAL exposure boundary is THIS host-side map, not
      # the in-container bind. The trading API has NO auth, so a bare "8877:8877" (i.e.
      # 0.0.0.0:8877) would let any LAN device place real-money trades. Set
      # TRADINGAGENTS_HOST_BIND=0.0.0.0 ONLY behind a trusted network + an auth proxy.
      - "${TRADINGAGENTS_HOST_BIND:-127.0.0.1}:5177:5177"
      - "${TRADINGAGENTS_HOST_BIND:-127.0.0.1}:8877:8877"
    volumes:
      - tradingagents_data:/app/.tradingagents
    tty: true
    stdin_open: true
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; r=urllib.request.urlopen('http://localhost:8877/api/v1/health'); assert r.status in (200,503)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  tradingagents_data:
  pgdata:
