name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pytest-asyncio httpx

      - name: Run backend test suite
        run: python -m pytest -q

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  deploy:
    name: Deploy to Oracle VM
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs:
      - backend-tests
      - frontend-build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: tradingagents-production
      cancel-in-progress: false
    steps:
      - name: Download frontend dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Configure SSH
        env:
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$ORACLE_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy application
        env:
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
          ORACLE_PORT: ${{ secrets.ORACLE_PORT }}
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_APP_DIR: ${{ secrets.ORACLE_APP_DIR }}
        run: |
          REMOTE_FRONTEND_DIST="/tmp/tradingagents-frontend-dist"
          REMOTE_CMD="set -euo pipefail; cd \"$ORACLE_APP_DIR\"; git fetch --all --prune; git pull --ff-only origin main; TRADINGAGENTS_FRONTEND_DIST_SOURCE=\"$REMOTE_FRONTEND_DIST\" TRADINGAGENTS_HEALTHCHECK_URL=\"http://127.0.0.1:8877/api/v1/health\" bash ./scripts/deploy.sh; rm -rf \"$REMOTE_FRONTEND_DIST\""
          SSH_OPTS=(
            -o BatchMode=yes
            -o ConnectTimeout=90
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=12
            -o TCPKeepAlive=yes
            -o StrictHostKeyChecking=no
            -o UserKnownHostsFile=/dev/null
            -p "$ORACLE_PORT"
          )
          SCP_OPTS=(
            -P "$ORACLE_PORT"
            -o BatchMode=yes
            -o ConnectTimeout=90
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=12
            -o TCPKeepAlive=yes
            -o StrictHostKeyChecking=no
            -o UserKnownHostsFile=/dev/null
          )

          for attempt in $(seq 1 5); do
            echo "Starting SSH deploy attempt ${attempt}/5..."

            if ssh "${SSH_OPTS[@]}" "$ORACLE_USER@$ORACLE_HOST" "rm -rf \"$REMOTE_FRONTEND_DIST\" && mkdir -p \"$REMOTE_FRONTEND_DIST\"" \
              && scp "${SCP_OPTS[@]}" -r frontend-dist/. "$ORACLE_USER@$ORACLE_HOST:$REMOTE_FRONTEND_DIST/" \
              && ssh "${SSH_OPTS[@]}" "$ORACLE_USER@$ORACLE_HOST" "$REMOTE_CMD"; then
              exit 0
            fi

            echo "SSH deploy attempt ${attempt}/5 failed. Retrying in 15 seconds..." >&2
            sleep 15
          done

          echo "SSH deployment failed after 5 attempts." >&2
          exit 1

      - name: Verify public HTTPS health endpoint
        run: |
          for attempt in $(seq 1 24); do
            if curl --fail --silent --show-error "${{ secrets.PRODUCTION_HEALTHCHECK_URL }}" >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Public health check failed." >&2
          exit 1
