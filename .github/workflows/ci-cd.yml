name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pytest-asyncio httpx

      - name: Run backend test suite
        run: python -m pytest -q

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  deploy:
    name: Deploy to Oracle VM
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs:
      - backend-tests
      - frontend-build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: tradingagents-production
      cancel-in-progress: false
    steps:
      - name: Deploy application
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: ${{ secrets.ORACLE_PORT }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd "${{ secrets.ORACLE_APP_DIR }}"
            git fetch --all --prune
            git pull --ff-only origin main
            export TRADINGAGENTS_HEALTHCHECK_URL="http://127.0.0.1:8877/api/v1/health"
            bash ./scripts/deploy.sh

      - name: Verify public HTTPS health endpoint
        run: |
          for attempt in $(seq 1 24); do
            if curl --fail --silent --show-error "${{ secrets.PRODUCTION_HEALTHCHECK_URL }}" >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Public health check failed." >&2
          exit 1
