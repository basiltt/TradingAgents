name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" --quiet
          pip install ruff mypy --quiet

      - name: Ruff lint
        run: ruff check backend/ tradingagents/

      - name: Ruff format check
        run: ruff format --check backend/ tradingagents/

      - name: Mypy backend
        run: mypy backend/ --ignore-missing-imports

      - name: Mypy tradingagents
        run: mypy tradingagents/ --ignore-missing-imports

  backend-tests:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" --quiet

      - name: Run backend unit tests
        run: python -m pytest tests/backend/ -q --tb=short -x
        env:
          ACCOUNTS_ENCRYPTION_KEY: ""

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc -b --noEmit

      - name: ESLint
        run: npx eslint src/ --max-warnings=0

      - name: Vitest unit tests
        run: npx vitest run

      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-checks]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tradingagents:ci-${{ github.sha }} .
