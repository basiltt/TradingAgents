name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" --quiet
          pip install ruff mypy --quiet

      - name: Ruff lint
        run: ruff check backend/ tradingagents/

      - name: Ruff format check
        run: ruff format --check backend/ tradingagents/

      - name: Mypy backend
        run: mypy backend/ --ignore-missing-imports

      - name: Mypy tradingagents
        run: mypy tradingagents/ --ignore-missing-imports

  backend-tests:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" --quiet

      - name: Run backend unit tests
        run: python -m pytest tests/backend/ -q --tb=short -x
        env:
          ACCOUNTS_ENCRYPTION_KEY: ""

  mcp-tests:
    # Dedicated MCP job on Linux (prod OS): runs the full MCP suite INCLUDING the
    # POSIX-only ProcessPool isolation + live-order-p95 protection gate that
    # skip-mark on Windows dev boxes (NFR-002/014). Uses a real Postgres for the
    # integration-marked repo/apply/sweep tests.
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tradingagents_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" --quiet

      - name: Import-linter (MCP boundary contracts)
        run: lint-imports

      - name: Run MCP suite (incl. Linux-only protection gate)
        run: python -m pytest tests/backend/mcp/ -q --tb=short
        env:
          ACCOUNTS_ENCRYPTION_KEY: ""
          MCP_TEST_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/tradingagents_test"

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc -b --noEmit

      - name: ESLint
        run: npx eslint src/ --max-warnings=0

      - name: Vitest unit tests
        run: npx vitest run

      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-checks]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tradingagents:ci-${{ github.sha }} .
