# TradingAgents nginx configuration
# Copy to /etc/nginx/sites-available/tradingagents and symlink to sites-enabled
#
# Adjust: server_name, ssl_certificate paths, and upstream ports as needed.

upstream tradingagents_backend {
    server 127.0.0.1:8877;
}

server {
    listen 80;
    server_name _;

    # Redirect HTTP to HTTPS (uncomment when SSL is configured)
    # return 301 https://$host$request_uri;

    # --- API (REST) ---
    location /api/ {
        proxy_pass http://tradingagents_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # --- WebSocket ---
    location /ws/ {
        proxy_pass http://tradingagents_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- Frontend (static build assets) ---
    location / {
        root /root/projects/TradingAgents/frontend/dist;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
